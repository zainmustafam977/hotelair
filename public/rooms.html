<!DOCTYPE html>
<html lang="en">
	<head>
		<!-- Meta and CSS includes -->
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Room Management - HotelAir</title>
		<link rel="icon" type="image/png" href="favicon.png" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
			rel="stylesheet"
		/>
		<link href="css/modern-theme.css" rel="stylesheet" />
	</head>
	<body>
		<div class="d-flex">
			<!-- Sidebar Navigation -->
			<nav class="sidebar bg-dark text-white p-3 vh-100" style="width: 240px">
				<!-- Logo and Brand -->
				<div class="hotelair-logo">
					<svg viewBox="0 0 32 32" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
						<defs>
							<linearGradient id="hotelair-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
								<stop stop-color="#1976d2" />
								<stop offset="1" stop-color="#00bcd4" />
							</linearGradient>
						</defs>
						<rect x="2" y="10" width="28" height="16" rx="4" fill="url(#hotelair-gradient)"/>
						<rect x="8" y="6" width="16" height="6" rx="2" fill="#fff" fill-opacity=".9"/>
						<circle cx="10" cy="24" r="2" fill="#fff" fill-opacity=".8"/>
						<circle cx="22" cy="24" r="2" fill="#fff" fill-opacity=".8"/>
					</svg>
					HotelAir
				</div>
				<!-- Sidebar Links -->
				<ul class="nav flex-column">
					<li class="nav-item">
						<a href="dashboard.html" class="nav-link text-white">Dashboard</a>
					</li>
					<li class="nav-item">
						<a href="rooms.html" class="nav-link text-white active">Rooms</a>
					</li>
					<li class="nav-item">
						<a href="bookings.html" class="nav-link text-white">Bookings</a>
					</li>
					<li class="nav-item">
						<a href="calendar.html" class="nav-link text-white">Calendar</a>
					</li>
					<li class="nav-item">
						<a href="guests.html" class="nav-link text-white">Guests</a>
					</li>
					<li class="nav-item">
						<a href="staff.html" class="nav-link text-white">Staff</a>
					</li>
					<li class="nav-item">
						<a href="payments.html" class="nav-link text-white">Payments</a>
					</li>
					<li class="nav-item">
						<a href="settings.html" class="nav-link text-white">Settings</a>
					</li>
					<li class="nav-item">
						<a href="about.html" class="nav-link text-white">About Us</a>
					</li>
				</ul>
			</nav>
			<div class="flex-grow-1">
				<!-- Header Bar -->
				<header class="navbar navbar-light px-4 shadow-sm">
					<div class="d-flex align-items-center justify-content-between w-100">
						<span class="navbar-brand">Room Management</span>
						<div class="d-flex align-items-center gap-2">
							<button id="darkModeToggle" title="Toggle dark mode"><i class="bi bi-moon-fill"></i></button>
							<button class="btn btn-outline-danger btn-sm ms-2" id="logoutBtn">Logout</button>
							<button class="btn btn-primary ms-2" id="addRoomBtn" data-bs-toggle="modal" data-bs-target="#roomModal">
								<i class="bi bi-plus-circle"></i> Add Room
							</button>
						</div>
					</div>
				</header>
				<main class="p-4">
					<!-- Loading Spinner -->
					<div
						id="loadingSpinner"
						class="text-center my-3"
						style="display: none"
					>
						<div class="spinner-border text-primary"></div>
					</div>

					<!-- Toast Container for notifications -->
					<div
						id="toastContainer"
						class="toast-container position-fixed bottom-0 end-0 p-3 z-3"
					></div>

					<!-- Rooms Table -->
					<div class="table-responsive">
						<table class="table table-bordered align-middle" id="roomsTable">
							<thead class="table-light">
								<tr>
									<th>Room #</th>
									<th>Type</th>
									<th>Price</th>
									<th>Capacity</th>
									<th>Status</th>
									<th>Description</th>
									<th>Actions</th>
								</tr>
							</thead>
							<tbody></tbody>
						</table>
					</div>
				</main>
			</div>
		</div>

		<!-- Room Modal -->
		<div class="modal fade" id="roomModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog">
				<form class="modal-content" id="roomForm">
					<div class="modal-header">
						<h5 class="modal-title">Room Form</h5>
						<button
							type="button"
							class="btn-close"
							data-bs-dismiss="modal"
						></button>
					</div>
					<div class="modal-body">
						<input type="hidden" id="roomId" />
						<div class="mb-3">
							<label class="form-label">Room Number</label>
							<input
								type="text"
								class="form-control"
								id="roomNumber"
								required
								aria-describedby="roomNumberError"
							/>
							<div class="invalid-feedback" id="roomNumberError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Room Type</label>
							<select class="form-select" id="roomType" required aria-describedby="roomTypeError"></select>
							<div class="invalid-feedback" id="roomTypeError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Price</label>
							<input
								type="number"
								class="form-control"
								id="roomPrice"
								required
								aria-describedby="roomPriceError"
							/>
							<div class="invalid-feedback" id="roomPriceError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Capacity</label>
							<input
								type="number"
								class="form-control"
								id="roomCapacity"
								required
								aria-describedby="roomCapacityError"
							/>
							<div class="invalid-feedback" id="roomCapacityError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Description</label>
							<textarea class="form-control" id="roomDesc" rows="2" aria-describedby="roomDescError"></textarea>
							<div class="invalid-feedback" id="roomDescError"></div>
						</div>
					</div>
					<div class="modal-footer">
						<button type="submit" class="btn btn-primary">Save</button>
						<button
							type="button"
							class="btn btn-secondary"
							data-bs-dismiss="modal"
						>
							Cancel
						</button>
					</div>
				</form>
			</div>
		</div>

		<!-- JS includes and room logic -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
		<script src="js/storage-utils.js"></script>
		<script src="js/rooms.js"></script>
	</body>
</html>
