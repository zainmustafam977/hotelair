<!-- guests.html -->
<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Guests - HotelAir</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
			rel="stylesheet"
		/>
		<link href="css/modern-theme.css" rel="stylesheet" />
	</head>
	<body>
		<div class="d-flex">
			<nav class="sidebar bg-dark text-white p-3 vh-100" style="width: 240px">
				<div class="hotelair-logo">
					<svg viewBox="0 0 32 32" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
						<defs>
							<linearGradient id="hotelair-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
								<stop stop-color="#1976d2" />
								<stop offset="1" stop-color="#00bcd4" />
							</linearGradient>
						</defs>
						<rect x="2" y="10" width="28" height="16" rx="4" fill="url(#hotelair-gradient)"/>
						<rect x="8" y="6" width="16" height="6" rx="2" fill="#fff" fill-opacity=".9"/>
						<circle cx="10" cy="24" r="2" fill="#fff" fill-opacity=".8"/>
						<circle cx="22" cy="24" r="2" fill="#fff" fill-opacity=".8"/>
					</svg>
					HotelAir
				</div>
				<ul class="nav flex-column">
					<li class="nav-item">
						<a href="dashboard.html" class="nav-link text-white">Dashboard</a>
					</li>
					<li class="nav-item">
						<a href="rooms.html" class="nav-link text-white">Rooms</a>
					</li>
					<li class="nav-item">
						<a href="bookings.html" class="nav-link text-white">Bookings</a>
					</li>
					<li class="nav-item">
						<a href="calendar.html" class="nav-link text-white">Calendar</a>
					</li>
					<li class="nav-item">
						<a href="guests.html" class="nav-link text-white active">Guests</a>
					</li>
					<li class="nav-item">
						<a href="staff.html" class="nav-link text-white">Staff</a>
					</li>
					<li class="nav-item">
						<a href="payments.html" class="nav-link text-white">Payments</a>
					</li>
					<li class="nav-item">
						<a href="settings.html" class="nav-link text-white">Settings</a>
					</li>
				</ul>
			</nav>

			<div class="flex-grow-1">
				<header class="navbar navbar-light px-4 shadow-sm">
					<div class="d-flex align-items-center justify-content-between w-100">
						<span class="navbar-brand">Guest Directory</span>
						<div class="d-flex align-items-center gap-2">
							<button id="darkModeToggle" title="Toggle dark mode"><i class="bi bi-moon-fill"></i></button>
							<button class="btn btn-outline-danger btn-sm ms-2" id="logoutBtn">Logout</button>
							<button
								class="btn btn-primary"
								data-bs-toggle="modal"
								data-bs-target="#guestModal"
							>
								Add Guest
							</button>
						</div>
					</div>
				</header>

				<main class="p-4">
					<div id="loadingSpinner" class="text-center my-3" style="display: none">
						<div class="spinner-border text-primary"></div>
					</div>
					<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3 z-3"></div>
					<div class="table-responsive">
						<table class="table table-bordered align-middle" id="guestsTable">
							<thead class="table-light">
								<tr>
									<th>#</th>
									<th>Name</th>
									<th>Email</th>
									<th>Phone</th>
									<th>Country</th>
									<th>Actions</th>
								</tr>
							</thead>
							<tbody></tbody>
						</table>
					</div>
				</main>
			</div>
		</div>

		<!-- Guest Modal -->
		<div class="modal fade" id="guestModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog">
				<form class="modal-content" id="guestForm">
					<div class="modal-header">
						<h5 class="modal-title">Guest Form</h5>
						<button
							type="button"
							class="btn-close"
							data-bs-dismiss="modal"
						></button>
					</div>
					<div class="modal-body">
						<input type="hidden" id="guestId" />
						<div class="mb-3">
							<label class="form-label">Full Name</label>
							<input type="text" class="form-control" id="guestName" required aria-describedby="guestNameError" />
							<div class="invalid-feedback" id="guestNameError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Email</label>
							<input type="email" class="form-control" id="guestEmail" required aria-describedby="guestEmailError" />
							<div class="invalid-feedback" id="guestEmailError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Phone</label>
							<input type="tel" class="form-control" id="guestPhone" required aria-describedby="guestPhoneError" />
							<div class="invalid-feedback" id="guestPhoneError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Country</label>
							<textarea class="form-control" id="guestAddress" rows="2" aria-describedby="guestAddressError"></textarea>
							<div class="invalid-feedback" id="guestAddressError"></div>
						</div>
					</div>
					<div class="modal-footer">
						<button type="submit" class="btn btn-primary">Save</button>
						<button
							type="button"
							class="btn btn-secondary"
							data-bs-dismiss="modal"
						>
							Cancel
						</button>
					</div>
				</form>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
		<script src="js/storage-utils.js"></script>
		<script src="js/guests.js"></script>
	</body>
</html>
