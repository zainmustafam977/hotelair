<!DOCTYPE html>
<html lang="en">
	<head>
		<!-- Meta and CSS includes -->
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Staff Management - HotelAir</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
			rel="stylesheet"
		/>
		<link href="css/modern-theme.css" rel="stylesheet" />
	</head>
	<body>
		<div class="d-flex">
			<!-- Sidebar Navigation -->
			<nav class="sidebar bg-dark text-white p-3 vh-100" style="width: 240px">
				<!-- Logo and Brand -->
				<div class="hotelair-logo">
					<svg viewBox="0 0 32 32" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
						<defs>
							<linearGradient id="hotelair-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
								<stop stop-color="#1976d2" />
								<stop offset="1" stop-color="#00bcd4" />
							</linearGradient>
						</defs>
						<rect x="2" y="10" width="28" height="16" rx="4" fill="url(#hotelair-gradient)"/>
						<rect x="8" y="6" width="16" height="6" rx="2" fill="#fff" fill-opacity=".9"/>
						<circle cx="10" cy="24" r="2" fill="#fff" fill-opacity=".8"/>
						<circle cx="22" cy="24" r="2" fill="#fff" fill-opacity=".8"/>
					</svg>
					HotelAir
				</div>
				<!-- Sidebar Links -->
				<ul class="nav flex-column">
					<li class="nav-item">
						<a href="dashboard.html" class="nav-link text-white">Dashboard</a>
					</li>
					<li class="nav-item">
						<a href="rooms.html" class="nav-link text-white">Rooms</a>
					</li>
					<li class="nav-item">
						<a href="bookings.html" class="nav-link text-white">Bookings</a>
					</li>
					<li class="nav-item">
						<a href="calendar.html" class="nav-link text-white">Calendar</a>
					</li>
					<li class="nav-item">
						<a href="guests.html" class="nav-link text-white">Guests</a>
					</li>
					<li class="nav-item">
						<a href="staff.html" class="nav-link text-white active">Staff</a>
					</li>
					<li class="nav-item">
						<a href="payments.html" class="nav-link text-white">Payments</a>
					</li>
					<li class="nav-item">
						<a href="settings.html" class="nav-link text-white">Settings</a>
					</li>
					<li class="nav-item">
						<a href="about.html" class="nav-link text-white">About Us</a>
					</li>
				</ul>
			</nav>

			<div class="flex-grow-1">
				<!-- Header Bar -->
				<header class="navbar navbar-light px-4 shadow-sm">
					<div class="d-flex align-items-center justify-content-between w-100">
						<span class="navbar-brand">Staff Management</span>
						<div class="d-flex align-items-center gap-2">
							<button id="darkModeToggle" title="Toggle dark mode"><i class="bi bi-moon-fill"></i></button>
							<button class="btn btn-outline-danger btn-sm ms-2" id="logoutBtn">Logout</button>
							<button
								class="btn btn-primary"
								data-bs-toggle="modal"
								data-bs-target="#staffModal"
							>
								Add Staff
							</button>
						</div>
					</div>
				</header>

				<main class="p-4">
					<!-- Staff Table -->
					<div class="table-responsive">
						<table class="table table-bordered align-middle" id="staffTable">
							<thead class="table-light">
								<tr>
									<th>#</th>
									<th>Name</th>
									<th>Role</th>
									<th>Email</th>
									<th>Phone</th>
									<th>Actions</th>
								</tr>
							</thead>
							<tbody></tbody>
						</table>
					</div>
				</main>
			</div>
		</div>

		<!-- Staff Modal -->
		<div class="modal fade" id="staffModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog">
				<form class="modal-content" id="staffForm">
					<div class="modal-header">
						<h5 class="modal-title">Staff Form</h5>
						<button
							type="button"
							class="btn-close"
							data-bs-dismiss="modal"
						></button>
					</div>
					<div class="modal-body">
						<input type="hidden" id="staffId" />
						<div class="mb-3">
							<label class="form-label">Full Name</label>
							<input type="text" class="form-control" id="staffName" required aria-describedby="staffNameError" />
							<div class="invalid-feedback" id="staffNameError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Role</label>
							<select class="form-select" id="staffRole" required aria-describedby="staffRoleError">
								<option value="">Select Role</option>
								<option value="Manager">Manager</option>
								<option value="Receptionist">Receptionist</option>
								<option value="Housekeeping">Housekeeping</option>
								<option value="Maintenance">Maintenance</option>
								<option value="Chef">Chef</option>
								<option value="Security">Security</option>
								<option value="Other">Other</option>
							</select>
							<div class="invalid-feedback" id="staffRoleError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Country</label>
							<select class="form-select" id="staffCountry" required aria-describedby="staffCountryError">
								<option value="">Select Country</option>
								<option value="USA">USA</option>
								<option value="UK">UK</option>
								<option value="Canada">Canada</option>
								<option value="Australia">Australia</option>
								<option value="India">India</option>
								<option value="Pakistan">Pakistan</option>
								<option value="Germany">Germany</option>
								<option value="France">France</option>
								<option value="Other">Other</option>
							</select>
							<div class="invalid-feedback" id="staffCountryError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Email</label>
							<input type="email" class="form-control" id="staffEmail" required aria-describedby="staffEmailError" />
							<div class="invalid-feedback" id="staffEmailError"></div>
						</div>
						<div class="mb-3">
							<label class="form-label">Phone</label>
							<input type="tel" class="form-control" id="staffPhone" required aria-describedby="staffPhoneError" />
							<div class="invalid-feedback" id="staffPhoneError"></div>
						</div>
					</div>
					<div class="modal-footer">
						<button type="submit" class="btn btn-primary">Save</button>
						<button
							type="button"
							class="btn btn-secondary"
							data-bs-dismiss="modal"
						>
							Cancel
						</button>
					</div>
				</form>
			</div>
		</div>

		<!-- Loading Spinner and Toast Container -->
		<div id="loadingSpinner" class="text-center my-3" style="display: none">
			<div class="spinner-border text-primary"></div>
		</div>
		<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3 z-3"></div>

		<!-- JS includes and staff logic -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
		<script src="js/storage-utils.js"></script>
		<script src="js/staff.js"></script>
		<script>
		// Client-side validation for staff form
		const staffForm = document.getElementById('staffForm');
		staffForm.onsubmit = function(e) {
			const name = document.getElementById('staffName').value.trim();
			const role = document.getElementById('staffRole').value;
			const email = document.getElementById('staffEmail').value.trim();
			const phone = document.getElementById('staffPhone').value.trim();
			const country = document.getElementById('staffCountry').value;
			let valid = true;
			let msg = '';
			if (!name) { valid = false; msg = 'Full name is required.'; }
			else if (!role) { valid = false; msg = 'Role is required.'; }
			else if (!country) { valid = false; msg = 'Country is required.'; }
			else if (!email || !/^\S+@\S+\.\S+$/.test(email)) { valid = false; msg = 'Valid email is required.'; }
			else if (!phone) { valid = false; msg = 'Phone is required.'; }
			if (!valid) {
				e.preventDefault();
				const toastContainer = document.getElementById('toastContainer');
				const toast = document.createElement('div');
				toast.className = 'toast align-items-center text-bg-danger border-0 show';
				toast.setAttribute('role', 'alert');
				toast.innerHTML = `<div class='d-flex'><div class='toast-body'>${msg}</div><button type='button' class='btn-close btn-close-white me-2 m-auto' data-bs-dismiss='toast'></button></div>`;
				toastContainer.appendChild(toast);
				setTimeout(() => toast.remove(), 4000);
				return false;
			}
		};
		</script>
	</body>
</html>
